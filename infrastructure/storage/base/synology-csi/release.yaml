apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: synology-csi
  namespace: synology-csi
spec:
  interval: 30m
  chart:
    spec:
      chart: synology-csi
      version: "0.11.0"
      sourceRef:
        kind: HelmRepository
        name: synology-csi
        namespace: flux-system
      interval: 12h
  values:
    existingSecret: synology-csi-secret
