apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: synology-csi
  namespace: synology-csi
spec:
  interval: 30m
  chart:
    spec:
      chart: synology-csi
      version: "0.11.0"
      sourceRef:
        kind: HelmRepository
        name: synology-csi
        namespace: flux-system
      interval: 12h

  values:
    clientInfoSecret:
      name: synology-csi-secret
      create: false
    node:
      kubeletPath: /var/lib/rancher/agent/kubelet
    storageClasses:
      iscsi-delete:
        disabled: false
        isDefault: true
        parameters:
          dsm: 192.168.1.81
          fsType: ext4
          location: /k3s-stg
          formatOptions: --nodiscard
          protocol: iscsi
        reclaimPolicy: Delete
      iscsi-retain:
        disabled: false
        reclaimPolicy: Retain
      nfs-delete:
        disabled: true
      nfs-retain:
        disabled: true
      smb-delete:
        disabled: true
      smb-retain:
        disabled: true
